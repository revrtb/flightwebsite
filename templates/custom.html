<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom - American Airlines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-plane me-2"></i>
                <strong>American Airlines</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tables"><i class="fas fa-table me-1"></i>Tables</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/images"><i class="fas fa-image me-1"></i>Images</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dynamic_switch"><i class="fas fa-toggle-on me-1"></i>Dynamic Switch</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/actionable"><i class="fas fa-bolt me-1"></i>Actionable</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/custom"><i class="fas fa-layer-group me-1"></i>Custom</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/signin"><i class="fas fa-user me-1"></i>Sign In</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fas fa-question-circle me-1"></i>Help</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">
            <i class="fas fa-layer-group me-2 text-primary"></i>
            Custom
        </h1>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Main page button</h5>
                        <button id="customClickBtn" class="btn btn-primary">
                            Click
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Iframe button</h5>
                        <iframe
                            title="Custom iframe"
                            style="width: 100%; height: 160px; border: 2px solid #dee2e6; border-radius: 10px;"
                            srcdoc="<!doctype html>
<html lang='en'>
  <head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet' />
    <style>
      body { padding: 16px; }
    </style>
  </head>
  <body>
    <button id='customClickBtnInFrame' class='btn btn-primary'>Click</button>
  </body>
</html>">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
