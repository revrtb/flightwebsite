<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data - American Airlines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body
    data-total-pages="{{ data_total_pages }}"
    data-items-per-page="{{ data_items_per_page }}"
>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-plane me-2"></i>
                <strong>American Airlines</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tables"><i class="fas fa-table me-1"></i>Tables</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/images"><i class="fas fa-image me-1"></i>Images</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dynamic_switch"><i class="fas fa-toggle-on me-1"></i>Dynamic Switch</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/actionable"><i class="fas fa-bolt me-1"></i>Actionable</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/custom"><i class="fas fa-layer-group me-1"></i>Custom</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/data"><i class="fas fa-database me-1"></i>Data</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/signin"><i class="fas fa-user me-1"></i>Sign In</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fas fa-question-circle me-1"></i>Help</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4 data-page">
        <h1 class="mb-2">
            <i class="fas fa-database me-2 text-primary"></i>
            Data
        </h1>
        <p class="text-muted mb-4">
            Cards load in pages as you scroll. There are <strong>{{ data_total_pages }}</strong> pages of items
            (<span id="dataPageSizeHint">{{ data_items_per_page }}</span> per page), four cards per row.
        </p>

        <div class="data-cards-wrap">
            <div id="dataCardsGrid" class="data-cards-grid" role="list"></div>
        </div>
        <div id="dataLoadSentinel" class="data-load-sentinel" aria-hidden="true"></div>
        <p id="dataLoadStatus" class="text-muted small mt-2 mb-0"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/data.js"></script>
</body>
</html>
